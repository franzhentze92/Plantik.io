version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --legacy-peer-deps
    build:
      commands:
        # Amplify injects console env vars into the build environment;
        # write them into .env.production so Next.js SSR/API routes see them.
        - env | grep -E '^(NEXT_PUBLIC_|OPENAI_)' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
